#
# Optimized auditd.conf for high-performance homelab
# Based on: https://linux-audit.com/tuning-auditd-high-performance-linux-auditing/
#

## Log file location
log_file = /var/log/audit/audit.log

## Log format - RAW is fastest (no enrichment overhead)
## ENRICHED adds hostname/text translation but is slower
log_format = ENRICHED

## Log group
log_group = adm

## Priority boost (4 = higher priority than most processes)
## Prevents auditd from being starved under load
priority_boost = 4

## Flush settings - INCREMENTAL_ASYNC is fastest
## Writes are buffered and flushed periodically
## INCREMENTAL = flush after each event (slow, safest)
## INCREMENTAL_ASYNC = buffer writes (fast, small risk)
## DATA = fsync after each write (slowest, safest)
## SYNC = sync entire filesystem (very slow)
flush = INCREMENTAL_ASYNC

## Flush frequency (in records)
## With INCREMENTAL_ASYNC, flush every 50 records
## Lower = safer but slower, Higher = faster but riskier
freq = 50

## Number of log files to keep
num_logs = 10

## Name format
## NONE = no computer name (fastest)
## HOSTNAME = add hostname (slight overhead)
## FQD = fully qualified domain (requires DNS lookup - slow)
name_format = NONE

## Maximum log file size (MB)
max_log_file = 100

## Action when log file reaches max size
## ROTATE = rotate logs (recommended)
## SYSLOG = send message to syslog
## SUSPEND = suspend logging
## KEEP_LOGS = keep writing (no rotation)
max_log_file_action = ROTATE

## Disk space management
## Space left threshold (MB)
space_left = 500
space_left_action = SYSLOG

## Admin space left threshold (MB)
admin_space_left = 50
admin_space_left_action = SYSLOG

## Disk full action
## SUSPEND = stop logging (safest, prevents disk fill)
## SYSLOG = only log to syslog
## ROTATE = rotate logs
## HALT = halt system (extreme)
disk_full_action = SUSPEND

## Disk error action
disk_error_action = SUSPEND

## Action when audit daemon stops
## SUSPEND = suspend event logging
## SYSLOG = only send to syslog
admin_space_left_action = SYSLOG
disk_full_action = SUSPEND
disk_error_action = SUSPEND

## TCP settings (only if using remote logging)
tcp_listen_queue = 5
tcp_max_per_addr = 1
##tcp_client_ports = 1024-65535
tcp_client_max_idle = 0

## Kerberos settings (only if using Kerberos)
enable_krb5 = no
##krb5_principal = auditd


## Write logs (for debugging only, disable in production)
write_logs = yes

## Plugin directory
plugin_dir = /etc/audit/plugins.d

## End of auditd.conf