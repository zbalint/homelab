services:
  nginx:
    image: nginx
    container_name: web
    restart: unless-stopped
    user: 4000:4000
    cpus: 1
    # cpu_shares: 256
    mem_limit: 512m
    memswap_limit: 512m
    mem_reservation: 256m
    network_mode: "bridge"
    # networks:
      # - web-net
    # pids_limit: 500
    # ulimits:
    #   nproc: 1000
    devices: []
    read_only: true
    tmpfs:
      - /run
      - /var/cache/nginx
    cap_drop:
      - all
    security_opt:
      - no-new-privileges
    ports:
      - ${BIND_ADDRESS:-127.0.0.1}:8080:80/tcp
    volumes:
      - /tmp/test/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /tmp/test/html:/usr/share/nginx/html:ro

