#!/usr/sbin/nft -f

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;

        # Loopback
        iif "lo" accept

        # Established/related
        ct state established,related accept

        # SSH only via Tailscale
        iif "tailscale0" tcp dport 22 accept

        # Allow reverse proxy port (e.g., 443) via Tailscale
        iif "tailscale0" tcp dport 443 accept

        # Drop everything else from Tailscale (narrowed trust)
        counter log prefix "[NFT DROP INPUT] " limit rate 5/second drop
    }

    chain forward {
        type filter hook forward priority 0; policy drop;

        ct state established,related accept

        # Reverse proxy can reach Docker
        iif "tailscale0" ip saddr 100.80.100.101 oif "docker0" accept
        iif "tailscale0" ip saddr 100.80.100.102 oif "docker0" accept

        # Docker -> Internet
        iif "docker0" oif "eth0" accept

        # Docker -> Tailscale (optional, if proxy needs replies)
        iif "docker0" oif "tailscale0" ip daddr 100.80.100.101 accept
        iif "docker0" oif "tailscale0" ip daddr 100.80.100.102 accept

        # Drop rest
        oif "docker0" counter log prefix "[NFT DROP DOCKER] " limit rate 5/second drop
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}

table ip nat {
    chain prerouting {
        type nat hook prerouting priority 0;
    }

    chain postrouting {
        type nat hook postrouting priority 100;

        # NAT Docker -> Internet
        oif "eth0" masquerade
    }
}
