#!/usr/sbin/nft -f

flush ruleset

table inet global {
    # Tailscale CGNAT range
    set tailscale_nets {
        type ipv4_addr
        flags interval
        elements = { 100.64.0.0/10 }
    }

    # Tailscale trusted ip addresses
    set tailscale_trusted_ips {
        type ipv4_addr
        elements = { 100.80.80.81, 100.80.80.82, 100.80.80.83,
                     100.80.80.91, 100.80.80.92, 100.80.80.93,
                     100.80.80.101, 100.80.80.102, 100.80.80.103 }
    }

    # Matches the entire allocated pool from your daemon.json
    set docker_subnets {
        type ipv4_addr
        flags interval
        elements = { 172.30.0.0/16 }
    }

    chain input {
        type filter hook input priority filter; policy drop;

        # Drop invalid packets
        ct state invalid drop

        # Drop ipv6 packets
        meta nfproto ipv6 drop

        # Accept packets on loopback
        iif "lo" accept

        # Anti-spoofing: Dropping Tailscale IPs from elsewhere
        ip saddr @tailscale_nets iifname != "tailscale0" drop

        # Allow established connections
        ct state established,related accept

        # Fix: Wildcard interface matching for all Docker bridges
        iifname { "docker0", "br-*" } ip saddr @tailscale_trusted_ips drop

        # SSH via Tailscale (Strictly Rate Limited)
        iifname "tailscale0" tcp dport 22 ct state new limit rate 3/minute burst 5 packets accept

        # Reverse proxy access via Tailscale
        iifname "tailscale0" ip saddr @tailscale_trusted_ips tcp dport 8080 ct state new accept

        # ICMP via Tailscale
        iifname "tailscale0" icmp type echo-request limit rate 5/second burst 10 packets accept

        # Required: Tailscale runs inside this LXC container local namespace
        udp dport 41641 accept

        # Drop everything else
        limit rate 100/second burst 200 packets log prefix "nft-input-drop: " group 1
        drop
    }

    chain forward {
        type filter hook forward priority filter; policy drop;

        # Drop invalid packets
        ct state invalid drop

        # Drop ipv6 packets
        meta nfproto ipv6 drop

        # Allow established connections
        ct state established,related accept

        # Fix: Dynamic Docker interface routing constraints
        # 1. Tailscale Ingress -> gVisor Containers
        iifname "tailscale0" ip saddr @tailscale_trusted_ips oifname { "docker0", "br-*" } ip daddr @docker_subnets ct state new accept

        # 2. gVisor Containers -> WAN Egress
        iifname { "docker0", "br-*" } ip saddr @docker_subnets oifname "eth0" ct state new accept

        # 3. gVisor Containers -> Tailscale Node Egress
        iifname { "docker0", "br-*" } ip saddr @docker_subnets oifname "tailscale0" ip daddr @tailscale_trusted_ips ct state new accept

        # Drop everything else
        limit rate 100/second burst 200 packets log prefix "nft-forward-drop: " group 1
        drop
    }

    chain output {
        type filter hook output priority filter; policy accept;
        meta nfproto ipv6 drop
    }

    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;
        
        # Fix: Enforce NAT masquerading for all traffic escaping via host interface eth0
        ip saddr @docker_subnets oifname "eth0" masquerade
        
        # Enforce NAT masquerading for traffic escaping via Tailscale fabric
        ip saddr @docker_subnets oifname "tailscale0" masquerade
    }
}