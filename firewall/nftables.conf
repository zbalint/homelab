#!/usr/sbin/nft -f

flush ruleset

table inet global {
    set tailscale_nets {
        type ipv4_addr
        flags interval
        elements = { 100.64.0.0/10 }
    }

    set tailscale_trusted_ips {
        type ipv4_addr
        elements = { 100.80.80.81, 100.80.80.82, 100.80.80.83,
                     100.80.80.91, 100.80.80.92, 100.80.80.93,
                     100.80.80.101, 100.80.80.102, 100.80.80.103 }
    }

    set docker_subnets {
        type ipv4_addr
        flags interval
        elements = { 172.30.0.0/16 }
    }

    chain input {
        type filter hook input priority filter; policy drop;

        # 1. Immediate connection tracking acceptance (Crucial for STUN replies)
        ct state established,related accept
        ct state invalid drop
        meta nfproto ipv6 drop
        
        # Loopback
        iif "lo" accept

        # FIX: Allow inbound DHCP configuration replies from the Incus bridge gateway
        udp sport 67 udp dport 68 ip saddr 10.0.0.1 accept

        # Anti-spoofing
        ip saddr @tailscale_nets iifname != "tailscale0" drop

        # Prevent Docker bridge from spoofing
        iifname { "br-*", "docker0" } ip saddr @tailscale_trusted_ips drop

        # SSH via Tailscale (Rate Limited)
        iifname "tailscale0" tcp dport 22 ct state new limit rate 3/minute burst 5 packets accept

        # Reverse proxy access via Tailscale
        iifname "tailscale0" ip saddr @tailscale_trusted_ips tcp dport 8080 ct state new accept

        # ICMP diagnostics
        iifname "tailscale0" icmp type echo-request limit rate 5/second burst 10 packets accept

        # 2. FIX: Explicitly allow Tailscale STUN protocol replies globally
        udp sport 3478 accept

        # 3. FIX: Allow Tailscale to negotiate dynamic peer-to-peer UDP bindings 
        udp dport 41641 accept

        limit rate 100/second burst 200 packets log prefix "nft-input-drop: " group 1
        drop
    }

    chain forward {
        type filter hook forward priority filter; policy drop;

        ct state established,related accept
        ct state invalid drop
        meta nfproto ipv6 drop

        # Tailscale -> Docker ingress
        iifname "tailscale0" ip saddr @tailscale_trusted_ips oifname { "br-*", "docker0" } ip daddr @docker_subnets ct state new accept

        # Docker -> WAN Egress
        iifname { "br-*", "docker0" } ip saddr @docker_subnets oifname "eth0" ct state new accept

        # Docker -> Tailscale Node Egress
        iifname { "br-*", "docker0" } ip saddr @docker_subnets oifname "tailscale0" ip daddr @tailscale_trusted_ips ct state new accept

        limit rate 100/second burst 200 packets log prefix "nft-forward-drop: " group 1
        drop
    }

    chain output {
        type filter hook output priority filter; policy drop;

        # 1. Block outbound IPv6 completely
        meta nfproto ipv6 drop

        # 2. Stateful Tracking (Crucial: allows responses to established traffic)
        ct state established,related accept
        ct state invalid drop

        # 3. Loopback
        oif "lo" accept

        # 4. Allowed Infrastructure Egress
        meta l4proto icmp icmp type echo-request accept
        tcp dport { 80, 443 } ct state new accept
        udp dport 123 ct state new accept
        
        # FIX: Allow outbound DHCP requests to the Incus bridge gateway
        udp sport 68 udp dport 67 ip daddr 10.0.0.1 accept
        
        # --- HIGH-SECURITY STRICT DNS FILTER ---
        # The container is completely forbidden from talking to ANY DNS server
        # EXCEPT Tailscale's local management IP.
        udp dport 53 ip daddr 100.100.100.100 ct state new accept
        tcp dport 53 ip daddr 100.100.100.100 ct state new accept

        # 5. FIX: Tailscale Fabric Egress Matrix
        # Allow any outbound traffic originating from Tailscale's core listening socket
        udp sport 41641 ct state new accept

        # Allow outbound traffic destined for Tailscale's STUN infrastructure
        udp dport 3478 ct state new accept

        # Allow outbound communication destined explicitly for known internal Tailscale IPs
        ip daddr @tailscale_nets ct state new accept

        # 6. Log and Drop any true unauthorized egress breakouts
        limit rate 3/minute burst 5 packets log prefix "nft-output-blocked: " group 1
        drop
    }

    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;
        ip saddr @docker_subnets oifname "eth0" masquerade
        ip saddr @docker_subnets oifname "tailscale0" masquerade
    }
}