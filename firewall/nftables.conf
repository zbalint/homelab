#!/usr/sbin/nft -f

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;

        # Allow loopback
        iif "lo" accept

        # Allow established/related connections
        ct state established,related accept

        # Allow SSH on tailscale
        iif "tailscale0" tcp dport 22 accept

        # Allow Tailscale traffic
        iif "tailscale0" accept

        # Log & drop everything else
        counter log prefix "[NFT DROP INPUT] " drop
    }

    chain forward {
        type filter hook forward priority 0; policy drop;

        ct state established,related accept

        # Allow reverse proxy (Tailscale IP 100.80.0.100) -> Docker containers
        iif "tailscale0" ip saddr 100.80.0.100 oif "docker0" accept

        # Allow Docker containers -> reverse proxy
        # iif "docker0" oif "tailscale0" ip daddr 100.80.0.100 accept

        # Allow Docker containers -> Internet
        iif "docker0" oif "eth0" accept

        # Log & drop everything else trying to reach Docker
        oif "docker0" counter log prefix "[NFT DROP DOCKER] " drop
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}

# NAT for Docker containers
table ip nat {
    chain prerouting {
        type nat hook prerouting priority 0;
    }

    chain postrouting {
        type nat hook postrouting priority 100;

        # NAT Docker -> Internet
        oif "eth0" masquerade
    }
}
