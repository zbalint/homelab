#!/usr/sbin/nft -f

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority -10; policy drop;

        # Loopback
        iif  "lo" accept

        # Established/related
        ct state established,related accept

        # SSH only via Tailscale
        iifname "tailscale0" tcp dport 22 accept

        # Allow reverse proxy port (e.g., 443) via Tailscale
        # iifname "tailscale0" tcp dport 8080 accept
        iifname "tailscale0" ip saddr 100.80.100.101 tcp dport 8080 accept
        iifname "tailscale0" ip saddr 100.80.100.102 tcp dport 8080 accept

        # Allow ICMP ping from Tailscale
        iifname "tailscale0" icmp type echo-request accept

        # Drop everything else from Tailscale (narrowed trust)
        counter log prefix "[NFT DROP INPUT] " limit rate 5/second drop
    }

    chain forward {
        type filter hook forward priority -10; policy drop;

        ct state established,related accept

        # reverse proxy -> default docker bridge
        iifname "tailscale0" ip saddr 100.80.100.101 oifname  "docker0" accept
        iifname "tailscale0" ip saddr 100.80.100.102 oifname  "docker0" accept
        # reverse proxy -> custom docker networks
        iifname "tailscale0" ip saddr 100.80.100.101 ip daddr 172.30.0.0/16 accept
        iifname "tailscale0" ip saddr 100.80.100.102 ip daddr 172.30.0.0/16 accept

        # Docker -> Internet
        iifname "docker0" oifname  "eth0" accept
        ip saddr 172.30.0.0/16 oifname "eth0" accept

        # Docker -> Tailscale (replies)
        iifname "docker0" oifname  "tailscale0" ip daddr 100.80.100.101 accept
        iifname "docker0" oifname  "tailscale0" ip daddr 100.80.100.102 accept
        ip saddr 172.30.0.0/16 oifname "tailscale0" ip daddr 100.80.100.101 accept
        ip saddr 172.30.0.0/16 oifname "tailscale0" ip daddr 100.80.100.102 accept

        # Drop rest
        oifname  "docker0" counter log prefix "[NFT DROP DOCKER] " limit rate 5/second drop
        ip saddr 172.30.0.0/16 counter log prefix "[NFT DROP DOCKER] " limit rate 5/second drop
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}

table ip nat {
    chain prerouting {
        type nat hook prerouting priority 0;
    }

    chain postrouting {
        type nat hook postrouting priority 100;

        # NAT Docker -> Internet
        oif  "eth0" masquerade
    }
}
