#!/usr/sbin/nft -f
flush ruleset

table inet filter {
    # Tailscale CGNAT range
    set tailscale_nets {
        type ipv4_addr
        flags interval
        elements = { 100.64.0.0/10 }
    }

    # Tailsacle trusted ip addresses
    set tailscale_trusted_ips {
        type ipv4_addr
        elements = { 100.80.80.81, 100.80.80.82, 100.80.80.83,
                     100.80.80.91, 100.80.80.92, 100.80.80.93,
                     100.80.80.101, 100.80.80.102, 100.80.80.103 }
    }

    set docker_subnets {
        type ipv4_addr
        flags interval
        elements = { 172.30.0.0/16 }
    }

    chain input {
        type filter hook input priority -10; policy drop;

        # Drop invalid packets
        ct state invalid drop

        meta nfproto ipv6 drop

        # Loopback
        iif "lo" accept

        # # Anti-spoofing
        ip saddr @tailscale_nets iifname != "tailscale0" drop

        # Established/related
        ct state established,related accept

        # Prevent Docker containers spoofing Tailscale IPs
        iifname "docker0" ip saddr @tailscale_trusted_ips drop

        # Allow DHCP for Docker containers
        iifname "docker0" udp dport 67 accept

        # SSH via Tailscale (rate limited)
        iifname "tailscale0" tcp dport 22 ct state new limit rate 3/minute burst 5 packets accept

        # Reverse proxy via Tailscale (trusted IPs only)
        iifname "tailscale0" ip saddr @tailscale_trusted_ips tcp dport 8080 ct state new accept

        # ICMP from Tailscale
        iifname "tailscale0" icmp type echo-request limit rate 5/second burst 10 packets accept

        # Tailscale WireGuard inbound
        udp dport 41641 accept

        # Log and drop everything else        
        # limit rate 100/second burst 200 packets log group 1
        limit rate 100/second burst 200 packets log prefix "nft-input-drop: " group 1
        drop
    }

    chain forward {
        type filter hook forward priority -10; policy drop;

        # Drop invalid packets
        ct state invalid drop

        meta nfproto ipv6 drop

        # Established/related
        ct state established,related accept

        # Tailscale -> Docker
        iifname "tailscale0" ip saddr @tailscale_trusted_ips oifname "docker0" ct state new accept

        # Docker -> Internet
        iifname "docker0" oifname "eth0" ct state new accept

        # Docker -> Tailscale
        iifname "docker0" oifname "tailscale0" ip daddr @tailscale_trusted_ips ct state new accept

        # Log and drop rest
        #limit rate 100/second burst 200 packets log group 1
        limit rate 100/second burst 200 packets log prefix "nft-forward-drop: " group 1
        drop
    }

    chain output {
        type filter hook output priority 0; policy accept;
        meta nfproto ipv6 drop
    }
}

table inet nat {
    set docker_subnets {
        type ipv4_addr
        flags interval
        elements = { 172.30.0.0/16 }
    }

    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;
        ip saddr @docker_subnets oifname "eth0" masquerade
    }
}