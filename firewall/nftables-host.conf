#!/usr/sbin/nft -f

flush ruleset

table inet filter {
    set tailscale-nets {
        type ipv4_addr
        flags interval
        elements = { 100.64.0.0/10 }
    }

    chain input {
        type filter hook input priority filter; policy drop;

        meta nfproto ipv6 drop
        ct state invalid drop
        iif lo accept

        # Infrastructure services strictly bounded to the container bridge interface
        iifname "incusbr0" udp dport 67 accept
        iifname "incusbr0" tcp dport 53 accept
        iifname "incusbr0" udp dport 53 accept

        # Anti-spoofing
        ip saddr @tailscale-nets iifname != "tailscale0" drop

        # Stateful tracking (Allows responses to connections the HOST itself started)
        ct state established,related accept

        # Tailscale STUN/P2P Hole-Punching Target for Host-Level Tailscale Engine
        iifname "eth0" udp dport 41641 ct state new accept

        # Explicitly allowed Management services over secure fabric
        iifname "tailscale0" ip saddr @tailscale-nets tcp dport 22 ct state new limit rate 5/minute burst 5 packets accept
        iifname "tailscale0" ip saddr @tailscale-nets tcp dport 8443 ct state new limit rate 20/second burst 40 packets accept
        iifname "tailscale0" ip saddr @tailscale-nets icmp type echo-request limit rate 5/second accept

        # Log and drop unauthorized data
        iifname "tailscale0" ip saddr @tailscale-nets limit rate 3/minute burst 5 packets log prefix "nft-ts-unauthorized: " drop
        iifname "tailscale0" ip saddr @tailscale-nets drop

        limit rate 3/minute burst 5 packets log prefix "nft-input-drop: " drop
        drop
    }

    chain forward {
        type filter hook forward priority filter; policy drop;

        meta nfproto ipv6 drop
        ct state invalid drop

        # Anti-spoofing for transit frames
        ip saddr @tailscale-nets iifname != "tailscale0" drop
        ip daddr @tailscale-nets oifname != "tailscale0" drop

        # Stateful Forwarding Engine
        ct state established,related accept

        # Permit Tailscale P2P direct inbound transit packets targeting containers
        iifname "eth0" oifname "incusbr0" udp dport 41641 ct state new accept

        # Permit unprivileged outbound requests from containers
        iifname "incusbr0" oifname "eth0" ct state new accept

        # Block egress transit leaks (Anti-Exit Node Abuse)
        iifname "tailscale0" oifname "eth0" log prefix "nft-exit-blocked: " drop

        limit rate 3/minute burst 5 packets log prefix "nft-forward-drop: " drop
        drop
    }

    chain output {
        type filter hook output priority filter; policy accept;
        meta nfproto ipv6 drop
    }
}

table inet nat {
    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;

        # Tailscale Port Preservation Map: Prevents Symmetric NAT port scrambling
        ip saddr 10.0.0.0/24 udp sport 41641 oifname "eth0" masquerade to :41641

        # Standard address translation for remaining generic outbound container traffic
        ip saddr 10.0.0.0/24 oifname "eth0" masquerade
    }
}