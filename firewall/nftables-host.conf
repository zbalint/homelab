#!/usr/sbin/nft -f

flush ruleset

table inet filter {
    # Tailscale CGNAT range
    set tailscale-nets {
        type ipv4_addr
        flags interval
        elements = { 100.64.0.0/10 }
    }

    chain input {
        # Priority -5: Run BEFORE any Docker rules
        type filter hook input priority -5; policy drop;

        # 1. Drop IPv6 completely
        meta nfproto ipv6 drop

        # 3. Drop invalid/malformed packets
        ct state invalid drop

        # 4. Loopback always allowed
        iif lo accept

        # ADD THIS: Allow DHCP requests from Incus containers
        iifname "incusbr0" udp dport 67 accept

        # ADD THIS: Allow DNS queries from Incus containers
        iifname "incusbr0" tcp dport 53 accept
        iifname "incusbr0" udp dport 53 accept

        # 5. Anti-spoofing: Prevent IP address forgery
        ip saddr @tailscale-nets iifname != "tailscale0" drop

        # 6. Allow established/related connections
        ct state established,related accept

        # 7. SSH from Tailscale (rate limited)
        iifname "tailscale0" ip saddr @tailscale-nets tcp dport 22 ct state new limit rate 5/minute burst 5 packets accept

        # 8. Incus WebUI from Tailscale (rate limited)
        iifname "tailscale0" ip saddr @tailscale-nets tcp dport 8443 ct state new limit rate 20/second burst 40 packets accept

        # 9. ICMP from Tailscale (rate limited)
        iifname "tailscale0" ip saddr @tailscale-nets icmp type echo-request limit rate 5/second accept

        # 11. Drop everything else from Tailscale (explicitly log)
        iifname "tailscale0" ip saddr @tailscale-nets limit rate 3/minute burst 5 packets log prefix "nft-ts-unauthorized: " drop
        iifname "tailscale0" ip saddr @tailscale-nets drop

        # 12. Log all other dropped packets (rate limited)
        limit rate 3/minute burst 5 packets log prefix "nft-input-drop: " drop
        drop
    }

    chain forward {
        # Priority -5: Run BEFORE any Docker rules
        type filter hook forward priority -5; policy drop;

        # 1. Drop IPv6
        meta nfproto ipv6 drop


        # 3. Drop invalid packets
        ct state invalid drop

        # 4. Anti-spoofing for forwarded traffic
        ip saddr @tailscale-nets iifname != "tailscale0" drop
        ip daddr @tailscale-nets oifname != "tailscale0" drop

        # Allow Incus containers outbound internet access
        iifname "incusbr0" oifname "eth0" ct state new,established,related accept

        # Allow return traffic
        iifname "eth0" oifname "incusbr0" ct state established,related accept

        # 5. Allow established/related connections
        ct state established,related accept

        # 9. CRITICAL: Block Tailscale -> Internet forwarding
        # Prevents VPS from being abused as exit node
        iifname "tailscale0" oifname "eth0" log prefix "nft-exit-blocked: " drop

        # 10. Log all other forward attempts (rate limited)
        limit rate 3/minute burst 5 packets log prefix "nft-forward-drop: " drop
        drop
    }

    chain output {
        type filter hook output priority filter; policy accept;

        # Block outgoing IPv6
        meta nfproto ipv6 drop

        # Allow all other outbound traffic
        # Host needs: apt, tailscale, incus, monitoring, etc.
    }
}

# Explicit NAT table declaration
table ip nat {
    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;

        # Allow Incus containers internet access via host eth0
        iifname "incusbr0" oifname "eth0" masquerade
        #oifname "eth0" ip saddr 10.0.0.1/24 masquerade
    }
}